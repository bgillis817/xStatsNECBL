name: Daily xStatsNECBL Refresh

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libuv1-dev libsodium-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/pipeline_daily.R') }}-v4
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R dependencies (pipeline)
        run: |
          Rscript -e 'install.packages(c("pacman","dplyr","readr","data.table","tidyr","lubridate","stringr","googledrive"), repos="https://cloud.r-project.org")'

      - name: Install R dependencies (app + deploy)
        run: |
          Rscript -e 'install.packages(c("rsconnect","shiny","shinydashboard","DT","ggplot2","rvest","httr","xml2","caret","xgboost"), repos="https://cloud.r-project.org")'

      - name: Write Google service account key
        run: echo '${{ secrets.GDRIVE_SA_KEY }}' > service_account.json

      - name: Run daily pipeline
        env:
          GDRIVE_SA_PATH: service_account.json
          GDRIVE_FOLDER_ID: "1haJdctNyLTx81GXlvCdBRDSWKrDAlKAw"
          LIVE_RDS_FILE_ID: "1IFO08F2YoO1qUXCw3GiU1k6FOXwt4Q0b"
        run: Rscript pipeline_daily.R

      - name: Clean up service account key
        if: always()
        run: rm -f service_account.json

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add navs_all_data.rds xwoba_clean_data.rds file_manifest.rds
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes to commit."
          else
            git commit -m "Daily xStats data refresh ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to shinyapps.io
        if: steps.commit.outputs.changed == 'true'
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            rsconnect::deployApp(
              appDir   = ".",
              appName  = "XwOBADashboard",
              forceUpdate = TRUE
            )
          '
